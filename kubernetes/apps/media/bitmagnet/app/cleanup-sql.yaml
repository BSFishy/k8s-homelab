---
# yaml-language-server: $schema=https://github.com/yannh/kubernetes-json-schema/raw/refs/heads/master/v1.33.3/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: bitmagnet-cleanup-sql
data:
  cleanup.sql: |-
    DO $$
    DECLARE
      candidates bytea[];
      batch_size integer := 10;
      deadlock_count integer := 0;
      picked_count integer := 0;
      deleted_count integer := 0;
    BEGIN
      PERFORM pg_advisory_lock(hashtext('bitmagnet_cleanup'));
      LOOP
        SELECT array_agg(info_hash) INTO candidates
        FROM (
          SELECT t.info_hash
          FROM torrents t
          WHERE t.updated_at < now() - interval '7 days'
            AND NOT EXISTS (
              SELECT 1
              FROM torrent_contents c
              WHERE c.info_hash = t.info_hash
                AND COALESCE(c.seeders, 0) + COALESCE(c.leechers, 0) > 0
                AND c.updated_at >= now() - interval '7 days'
            )
          ORDER BY t.info_hash
          LIMIT batch_size
          FOR UPDATE SKIP LOCKED
        ) s;

        picked_count := COALESCE(array_length(candidates, 1), 0);
        EXIT WHEN picked_count = 0;
        RAISE NOTICE 'bitmagnet cleanup: picked % candidates', picked_count;

        BEGIN
          PERFORM set_config('lock_timeout', '2s', true);
          LOCK TABLE torrents_torrent_sources,
                     torrent_contents,
                     torrent_files,
                     torrent_hints,
                     torrent_pieces,
                     torrent_tags,
                     torrents
            IN SHARE ROW EXCLUSIVE MODE;
          DELETE FROM torrents_torrent_sources WHERE info_hash = ANY (candidates);
          DELETE FROM torrent_contents WHERE info_hash = ANY (candidates);
          DELETE FROM torrent_files WHERE info_hash = ANY (candidates);
          DELETE FROM torrent_hints WHERE info_hash = ANY (candidates);
          DELETE FROM torrent_pieces WHERE info_hash = ANY (candidates);
          DELETE FROM torrent_tags WHERE info_hash = ANY (candidates);
          DELETE FROM torrents WHERE info_hash = ANY (candidates);
          GET DIAGNOSTICS deleted_count = ROW_COUNT;
          RAISE NOTICE 'bitmagnet cleanup: deleted % torrents in batch', deleted_count;
          deadlock_count := 0;
        EXCEPTION
          WHEN lock_not_available THEN
            deadlock_count := deadlock_count + 1;
            RAISE NOTICE 'bitmagnet cleanup: lock timeout (attempt %), retrying', deadlock_count;
            PERFORM pg_sleep(0.5);
            IF deadlock_count >= 10 THEN
              RAISE NOTICE 'bitmagnet cleanup: too many lock timeouts, stopping early';
              EXIT;
            END IF;
          WHEN deadlock_detected THEN
            deadlock_count := deadlock_count + 1;
            RAISE NOTICE 'bitmagnet cleanup: deadlock detected (attempt %), retrying', deadlock_count;
            PERFORM pg_sleep(0.25);
            IF deadlock_count >= 10 THEN
              RAISE NOTICE 'bitmagnet cleanup: too many deadlocks, stopping early';
              EXIT;
            END IF;
        END;
      END LOOP;
      PERFORM pg_advisory_unlock(hashtext('bitmagnet_cleanup'));
    END $$;
